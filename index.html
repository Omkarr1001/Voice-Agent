<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Zepmed Assistant — Support and enquiries for India's hyperlocal medicine network.">
  <title>Zepmed Assistant | India's Hyperlocal Medicine Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 id="headerTitle">Zepmed Assistant</h1>
      <p id="headerTagline">India's Hyperlocal Medicine Network</p>
    </header>
    <div id="chatBox" class="chat-box" role="log" aria-live="polite"></div>
    <div class="status" id="status" aria-live="polite">Ready</div>
    <footer class="footer">
      <a id="footerLink" href="https://zepmed.org" target="_blank" rel="noopener">Submit enquiry · zepmed.org</a>
    </footer>
    <div class="input-area">
      <input
        id="input"
        type="text"
        placeholder="Ask about delivery, orders, or partner signup..."
        aria-label="Your message"
        autocomplete="off"
      />
      <button id="sendBtn" class="send-btn" type="button" aria-label="Send">➤</button>
      <button id="micBtn" class="mic-btn" type="button" aria-label="Start voice">🎤</button>
    </div>
  </div>

  <!-- Config: on Vercel we fetch /api/config first so voice keys are ready before app runs. -->
  <script>
    window.ZEPMED_CONFIG = {
      vapi: { publicKey: "", assistantId: "" },
      backendUrl: "",
      company: { name: "Zepmed", tagline: "India's Hyperlocal Medicine Network", website: "https://zepmed.org" }
    };
    var isLocalHost = /^(localhost|127\.0\.0\.1)$/.test(typeof location !== "undefined" && location.hostname);
    function loadAppScripts() {
      if (!window.ZEPMED_CONFIG.vapi) window.ZEPMED_CONFIG.vapi = {};
      if (!window.ZEPMED_CONFIG.company) window.ZEPMED_CONFIG.company = { name: "Zepmed", website: "https://zepmed.org" };
      var s1 = document.createElement("script");
      s1.src = "https://cdn.jsdelivr.net/gh/balacodeio/Vapi-Web-UMD@latest/dist/latest/vapi-web-bundle.min.js";
      s1.onload = function () {
        var s2 = document.createElement("script"); s2.src = "js/assistant.js"; document.body.appendChild(s2);
        var s3 = document.createElement("script"); s3.src = "js/app.js"; document.body.appendChild(s3);
      };
      s1.onerror = function () {
        var s2 = document.createElement("script"); s2.src = "js/assistant.js"; document.body.appendChild(s2);
        var s3 = document.createElement("script"); s3.src = "js/app.js"; document.body.appendChild(s3);
      };
      document.body.appendChild(s1);
    }
    if (isLocalHost) {
      var c = document.createElement("script"); c.src = "config.js"; document.body.appendChild(c);
      setTimeout(loadAppScripts, 100);
    } else {
      function loadVoiceConfig() {
        var url = "/api/voice-config";
        fetch(url).then(function (r) {
          if (r.ok) return r.json();
          if (r.status === 404 && url === "/api/voice-config") return fetch("/api/config").then(function (r2) { return r2.ok ? r2.json() : {}; });
          return {};
        }).then(function (d) {
          if (d && d.vapi) window.ZEPMED_CONFIG.vapi = d.vapi;
        }).catch(function () {}).finally(loadAppScripts);
      }
      loadVoiceConfig();
    }
  </script>
</body>
</html>
